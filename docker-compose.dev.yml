services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: builder
    container_name: hrm-nest-js-dev
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:-hrm_user}
      DB_PASSWORD: ${DB_PASSWORD:-hrm_pass}
      DB_NAME: ${DB_NAME:-hrm_db}
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mariadb:10.11
    container_name: hrm-mysql-dev
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
      MARIADB_DATABASE: ${DB_NAME:-hrm_db}
      MARIADB_USER: ${DB_USERNAME:-hrm_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-hrm_pass}
    # tmpfs stores data in RAM — instant init on WSL2, no slow disk I/O
    tmpfs:
      - /var/lib/mysql:size=512m
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped
