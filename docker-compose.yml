services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: hrm-nest-js
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:-hrm_user}
      DB_PASSWORD: ${DB_PASSWORD:-hrm_pass}
      DB_NAME: ${DB_NAME:-hrm_db}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: hrm-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
      MYSQL_DATABASE: ${DB_NAME:-hrm_db}
      MYSQL_USER: ${DB_USERNAME:-hrm_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hrm_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
